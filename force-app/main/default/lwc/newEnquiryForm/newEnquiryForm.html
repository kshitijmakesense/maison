<template>
    <div class="enquiry-container">
        <button class="book-btn" onclick={toggleForm}>
            + Book New Service
        </button>

        <template if:true={showForm}>
            <div class="form-wrapper">
                <lightning-card title="Event Details">
                    <div class="form-content">
                        <template if:true={isLoading}>
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </template>

                        <!-- Event Type -->
                        <lightning-combobox
                            name="eventType"
                            label="Event Type"
                            value={formData.eventType}
                            options={eventTypeOptions}
                            data-field="eventType"
                            onchange={handleInputChange}
                            required>
                        </lightning-combobox>

                        <!-- Event Title -->
                        <lightning-input
                            type="text"
                            name="eventTitle"
                            label="Event Title"
                            value={formData.eventTitle}
                            data-field="eventTitle"
                            onchange={handleInputChange}
                            required>
                        </lightning-input>

                        <!-- Event Date -->
                        <lightning-input
                            type="date"
                            name="eventDate"
                            label="Event Date"
                            value={formData.eventDate}
                            data-field="eventDate"
                            onchange={handleInputChange}
                            required>
                        </lightning-input>

                        <!-- Event Time -->
                        <lightning-input
                            type="time"
                            name="eventTime"
                            label="Event Time"
                            value={formData.eventTime}
                            data-field="eventTime"
                            onchange={handleInputChange}>
                        </lightning-input>

                        <!-- Number of Guests -->
                        <lightning-input
                            type="number"
                            name="numberOfGuests"
                            label="Number of Guests"
                            value={formData.numberOfGuests}
                            data-field="numberOfGuests"
                            onchange={handleInputChange}
                            min="1"
                            required>
                        </lightning-input>

                        <!-- Estimated Budget -->
                        <lightning-input
                            type="number"
                            name="estimatedBudget"
                            label="Estimated Budget (AUD)"
                            value={formData.estimatedBudget}
                            data-field="estimatedBudget"
                            onchange={handleInputChange}
                            min="0"
                            step="0.01"
                            formatter="currency">
                        </lightning-input>

                        <!-- Venue Name -->
                        <lightning-input
                            type="text"
                            name="venueName"
                            label="Venue Name"
                            value={formData.venueName}
                            data-field="venueName"
                            onchange={handleInputChange}>
                        </lightning-input>

                        <!-- Venue Address -->
                        <lightning-textarea
                            name="venueAddress"
                            label="Venue Address"
                            value={formData.venueAddress}
                            data-field="venueAddress"
                            onchange={handleInputChange}
                            max-length="255">
                        </lightning-textarea>

                        <!-- Action Buttons -->
                        <div class="button-group">
                            <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                            <lightning-button variant="brand" label="Submit Enquiry" onclick={handleSubmit} disabled={isLoading}></lightning-button>
                        </div>
                    </div>
                </lightning-card>
            </div>
        </template>
    </div>

    <!-- custom toast -->
    <c-toast-message></c-toast-message>
</template>
