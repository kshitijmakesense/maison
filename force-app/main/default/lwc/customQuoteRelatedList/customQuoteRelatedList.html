<template>
    <lightning-card title="Quotes">

        <!-- Error state -->
        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_medium">
                Error loading quotes.
            </div>
        </template>

        <!-- Data state -->
        <template if:true={quotes}>
            <!-- When we have at least one quote -->
            <template if:true={quotes.length}>
                <div class="slds-m-around_medium">
                    <lightning-datatable
                        key-field="Id"
                        data={quotes}
                        columns={columns}
                        hide-checkbox-column="true">
                    </lightning-datatable>
                </div>
            </template>

            <!-- When quotes array is empty -->
            <template if:false={quotes.length}>
                <div class="slds-p-around_medium">
                    No quotes found for this enquiry.
                </div>
            </template>
        </template>

    </lightning-card>
</template>
